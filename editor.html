<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WYSIWYG HTML Editor</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="content">
        <div class="editor">

            <div class="editor-toolbar" role="toolbar" aria-label="Editor tools">

                <div class="toolbar-group">
                    <button data-cmd="bold" title="Bold (Ctrl+B)">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#format_bold"/></svg>
                    </button>
                    <button data-cmd="italic" title="Italic (Ctrl+I)">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#format_italic"/></svg>
                    </button>
                    <button data-cmd="underline" title="Underline (Ctrl+U)">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#format_underlined"/></svg>
                    </button>
                    <button data-cmd="strikeThrough" title="Strikethrough">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#format_strikethrough"/></svg>
                    </button>
                </div>

                <div class="toolbar-separator"></div>

                <div class="toolbar-group">
                    <button data-cmd="formatBlock" data-value="h1" title="Heading 1" class="toolbar-label">H1</button>
                    <button data-cmd="formatBlock" data-value="h2" title="Heading 2" class="toolbar-label">H2</button>
                    <button data-cmd="formatBlock" data-value="p" title="Paragraph">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#format_size"/></svg>
                    </button>
                </div>

                <div class="toolbar-separator"></div>

                <div class="toolbar-group">
                    <button data-cmd="insertUnorderedList" title="Bullet list">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#format_list_bulleted"/></svg>
                    </button>
                    <button data-cmd="insertOrderedList" title="Numbered list">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#format_list_numbered"/></svg>
                    </button>
                </div>

                <div class="toolbar-separator"></div>

                <div class="toolbar-group">
                    <button id="linkBtn" title="Insert link (Ctrl+K)">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#link"/></svg>
                    </button>
                    <button id="imageBtn" title="Insert image">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#add_photo_alternate"/></svg>
                    </button>
                    <input type="file" id="imageFile" accept="image/*" hidden />
                </div>

                <div class="toolbar-separator"></div>

                <div class="toolbar-group">
                    <button id="cleanBtn" title="Clear formatting">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#backspace"/></svg>
                    </button>
                    <button id="undoBtn" title="Undo (Ctrl+Z)">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#undo"/></svg>
                    </button>
                    <button id="redoBtn" title="Redo (Ctrl+Y)">
                        <svg class="icon-svg"><use href="svg-icons/icons.svg#redo"/></svg>
                    </button>
                </div>

                <div class="toolbar-end">
                    
                </div>

            </div>

            <div class="editor-body">
                <div class="editor-main">
                    <div id="editable" class="editable" contenteditable="true" spellcheck="true"
                        aria-label="Editing area">
                    </div>
                </div>

                <div class="editor-side hidden" id="sidePanel">
                    <div class="side-tabs">
                        <button class="side-tab active" data-tab="codePanel">Code</button>
                        <button class="side-tab" data-tab="previewPanel">Preview</button>
                    </div>
                    <div class="side-panels">
                        <div class="side-panel active" id="codePanel">
                            <textarea id="code" spellcheck="false" autocomplete="off"
                                placeholder="HTML will appear here…"></textarea>
                            <div class="code-actions">
                                <button title="Apply HTML to editor">Apply</button>
                                <button title="Strip unsafe elements">Sanitize</button>
                                <button title="Remove whitespace">Minify</button>
                            </div>
                        </div>
                        <div class="side-panel" id="previewPanel">
                            <div class="preview-content" id="preview"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="editor-footer">
                <span class="editor-wordcount" id="wordCount">0 words</span>
                <span class="editor-shortcuts">
                    <span><kbd>Ctrl+B</kbd> Bold</span>
                    <span><kbd>Ctrl+K</kbd> Link</span>
                    <span><kbd>Ctrl+S</kbd> Save</span>
                </span>
            </div>

        </div>
    </div>

    <script type="module">
        import { Editor } from './js/editor.js';
        new Editor();
    </script>
</body>

</html>
