<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WYSIWYG HTML Editor</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/editor.css" />
</head>

<body>
    <div class="content">
        <div class="editor">
            <div class="editor-toolbar" role="toolbar" aria-label="Editor tools">
                <div class="toolbar-group">
                    <button data-cmd="bold" title="Bold (Ctrl+B)">
                        <span class="icon icon-format_bold"></span>
                    </button>
                    <button data-cmd="italic" title="Italic (Ctrl+I)">
                        <span class="icon icon-format_italic"></span>
                    </button>
                    <button data-cmd="underline" title="Underline (Ctrl+U)">
                        <span class="icon icon-format_underlined"></span>
                    </button>
                    <button data-cmd="strikeThrough" title="Strikethrough">
                        <span class="icon icon-strikethrough"></span>
                    </button>
                </div>

                <div class="toolbar-separator"></div>

                <div class="toolbar-group">
                    <button data-cmd="formatBlock" data-value="h1" title="Heading 1">
                        H1
                    </button>
                    <button data-cmd="formatBlock" data-value="h2" title="Heading 2">
                        H2
                    </button>
                    <button data-cmd="formatBlock" data-value="p" title="Paragraph">
                        <span class="icon icon-format_paragraph"></span>
                    </button>
                </div>

                <div class="toolbar-separator"></div>

                <div class="toolbar-group">
                    <button data-cmd="insertUnorderedList" title="Bullet list">
                        <span class="icon icon-format_list_bulleted"></span>
                    </button>
                    <button data-cmd="insertOrderedList" title="Numbered list">
                        <span class="icon icon-format_list_numbered"></span>
                    </button>
                </div>

                <div class="toolbar-separator"></div>

                <div class="toolbar-group">
                    <button id="linkBtn" title="Insert link (Ctrl+K)">
                        <span class="icon icon-link"></span>
                    </button>
                    <button id="imageBtn" title="Insert image">
                        <span class="icon icon-add_photo_alternate"></span>
                    </button>
                    <input type="file" id="imageFile" accept="image/*" hidden />
                </div>

                <div class="toolbar-separator"></div>

                <div class="toolbar-group">
                    <button id="cleanBtn" title="Clear formatting">
                        <span class="icon icon-format_clear"></span>
                    </button>
                    <button id="undoBtn" title="Undo (Ctrl+Z)">
                        <span class="icon icon-undo"></span>
                    </button>
                    <button id="redoBtn" title="Redo (Ctrl+Y)">
                        <span class="icon icon-redo"></span>
                    </button>
                </div>

                <div class="toolbar-end">
                    <button id="toggleCodeBtn" title="Toggle code panel">
                        <span class="icon icon-code"></span>
                    </button>
                    <button id="saveBtn" class="toolbar-btn-accent" title="Download HTML (Ctrl+S)">
                        <span class="icon icon-save"></span>
                    </button>
                    <button id="clearBtn" class="toolbar-btn-danger" title="Clear all content">
                        <span class="icon icon-delete"></span>
                    </button>
                </div>
            </div>

            <div class="editor-body">
                <div class="editor-main">
                    <div id="editable" class="editable" contenteditable="true" spellcheck="true"
                        aria-label="Editing area">
                    </div>
                </div>
            </div>

            <div class="editor-footer">
                <span class="editor-wordcount" id="wordCount">0 words</span>
                <span class="editor-shortcuts">
                    <kbd>Ctrl+B</kbd> Bold
                    <kbd>Ctrl+K</kbd> Link
                    <kbd>Ctrl+S</kbd> Save
                </span>
            </div>
        </div>
    </div>

    <script type="module">
        import { Editor } from './js/editor.js';
        new Editor();
    </script>
</body>

</html>
