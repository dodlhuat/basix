name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typecheck

      - name: Build (css + js)
        run: make build

      - name: Check for uncommitted build output
        run: |
          if ! git diff --exit-code; then
            echo "::error::Build output is out of date. Run 'make build' locally and commit the result."
            exit 1
          fi
