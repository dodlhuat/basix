<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basix Calendar — Beispiel</title>

    <!-- 1. Basix Framework -->
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="row" style="padding: 2rem;">
    <div class="column">

        <!-- Optional: wrap in a Basix card -->
        <div class="row card">
            <div class="column">
                <!-- Calendar mounts here -->
                <div id="my-calendar"></div>
            </div>
        </div>

    </div>
</div>

<!-- Basix icon sprite -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="chevron_left" viewBox="0 0 24 24">
        <path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
    </symbol>
    <symbol id="chevron_right" viewBox="0 0 24 24">
        <path d="M10 6 8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
    </symbol>
</svg>

<!-- 3. Calendar module -->
<script type="module">
    import { Calendar } from '/js/calendar.js';

    // --- Sample events ---
    const today = new Date();
    const y = today.getFullYear();
    const m = today.getMonth();

    const events = [
        {
            id: '1',
            title: 'Team-Meeting',
            start: new Date(y, m, today.getDate(), 9, 0),
            end:   new Date(y, m, today.getDate(), 10, 30),
            // Uses Basix badge-success class for green color
            className: 'badge-success',
        },
        {
            id: '2',
            title: 'Deployment',
            start: new Date(y, m, today.getDate(), 14, 0),
            end:   new Date(y, m, today.getDate(), 15, 0),
            className: 'badge-warning',
        },
        {
            id: '3',
            title: 'Sprint Planning',
            start: new Date(y, m, today.getDate() + 1, 10, 0),
            end:   new Date(y, m, today.getDate() + 1, 12, 0),
        },
        {
            id: '4',
            title: 'Urlaub',
            start: new Date(y, m, today.getDate() + 3),
            end:   new Date(y, m, today.getDate() + 5),
            allDay: true,
            className: 'badge-info',
        },
        {
            id: '5',
            title: 'Release Review',
            start: new Date(y, m, today.getDate() + 2, 16, 0),
            end:   new Date(y, m, today.getDate() + 2, 17, 0),
            className: 'badge-error',
        },
    ];

    // --- Instantiate ---
    const cal = new Calendar({
        container: '#my-calendar',
        events,
        view: 'month',
        showOutsideDays: true,

        locale: {
            // Already defaults to German — override any keys here if needed
            firstDayOfWeek: 1, // Monday
        },

        onDayClick(date) {
            console.log('Day clicked:', date.toLocaleDateString('de-AT'));
        },

        onEventClick(event) {
            // Example: open a Basix Modal with event details
            console.log('Event clicked:', event.title);
            /*
            new Modal({
              header: event.title,
              content: `<p>${formatTime(event.start)} – ${formatTime(event.end)}</p>`,
              closeable: true,
              type: 'info',
            });
            */
        },

        onChange(date, view) {
            console.log('Navigated to:', date.toLocaleDateString('de-AT'), view);
        },
    });

    // --- Public API examples ---
    // cal.next();
    // cal.prev();
    // cal.today();
    // cal.setView('week');
    // cal.addEvent({ id: '99', title: 'New', start: new Date(), end: new Date(), allDay: true });
    // cal.setEvents([]);
</script>

</body>
</html>
